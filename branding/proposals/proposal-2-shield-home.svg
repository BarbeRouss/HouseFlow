<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="grad2a" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4338ca;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Shield shape with house -->
  <g transform="translate(15, 8)">
    <!-- Shield -->
    <path d="M45 5 L80 20 L80 55 C80 78 60 95 45 102 C30 95 10 78 10 55 L10 20 Z" fill="url(#grad2a)"/>
    <!-- House silhouette inside shield -->
    <path d="M45 30 L25 46 L30 46 L30 68 L60 68 L60 46 L65 46 Z" fill="white" opacity="0.95"/>
    <!-- Checkmark in house -->
    <path d="M38 54 L43 60 L55 47" stroke="#4338ca" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Text -->
  <text x="110" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700">
    <tspan fill="#1e1b4b">House</tspan><tspan fill="#6366f1">Flow</tspan>
  </text>
  <!-- Tagline -->
  <text x="112" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b" letter-spacing="2">
