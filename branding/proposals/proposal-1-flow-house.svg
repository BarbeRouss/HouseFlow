<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- House icon with flow wave -->
  <g transform="translate(20, 10)">
    <!-- House shape -->
    <path d="M45 20 L10 50 L18 50 L18 85 L72 85 L72 50 L80 50 Z" fill="url(#grad1)" rx="4"/>
    <!-- Flow wave inside house -->
    <path d="M28 58 C34 48, 42 68, 48 58 C54 48, 62 68, 68 58" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M28 72 C34 62, 42 82, 48 72 C54 62, 62 82, 68 72" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>
  <!-- Text -->
  <text x="115" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#1e1b4b">
    <tspan fill="#6366f1">House</tspan><tspan fill="#1e1b4b">Flow</tspan>
  </text>
  <!-- Tagline -->
  <text x="117" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b" letter-spacing="2">
    MAINTENANCE SIMPLIFIEE
  </text>
</svg>
