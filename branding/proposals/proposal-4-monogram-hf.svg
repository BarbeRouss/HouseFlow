<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5b4fc;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g transform="translate(15, 8)">
    <!-- Rounded square background -->
    <rect x="4" y="4" width="96" height="96" rx="22" fill="url(#grad4)"/>
    <!-- H letter stylized as house -->
    <path d="M25 80 L25 28 L25 22 L45 12 L65 22 L65 28 L65 80" stroke="white" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- H crossbar as flow wave -->
    <path d="M25 52 C35 40, 45 64, 55 52 C60 46, 63 50, 65 52" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- F integrated -->
    <path d="M72 28 L85 28 M72 48 L82 48" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
    <line x1="72" y1="22" x2="72" y2="80" stroke="white" stroke-width="7" stroke-linecap="round"/>
  </g>
  <!-- Text -->
  <text x="125" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700">
    <tspan fill="#6366f1">H</tspan><tspan fill="#1e1b4b">ouse</tspan><tspan fill="#6366f1">F</tspan><tspan fill="#1e1b4b">low</tspan>
  </text>
  <!-- Tagline -->
  <text x="127" y="86" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#64748b" letter-spacing="2.5">
    SMART HOME MAINTENANCE
  </text>
</svg>
